<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulyator</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f1f5f9;
        font-family: sans-serif;
      }
      .calc {
        background: #334155;
        padding: 20px;
        border-radius: 10px;
        width: 250px;
      }
      #display {
        width: 100%;
        height: 50px;
        background: white;
        text-align: right;
        padding: 5px 10px;
        font-size: 24px;
        box-sizing: border-box;
        border-radius: 5px;
        margin-bottom: 15px;
        border: none;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      button {
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #64748b;
        color: white;
      }
      button.orange {
        background: #f97316;
      }
      button.clear {
        background: #ef4444;
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <div class="calc">
      <input type="text" id="display" readonly />
      <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="append('/')">/</button>
        <button onclick="append('*')">*</button>
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('-')">-</button>
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('+')">+</button>
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="orange" onclick="calculate()">=</button>
        <button onclick="append('0')" style="grid-column: span 2">0</button>
        <button onclick="append('.')">.</button>
      </div>
    </div>

    <script>
      const display = document.getElementById("display");
      function append(val) {
        display.value += val;
      }
      function clearDisplay() {
        display.value = "";
      }
      function calculate() {
        try {
          display.value = eval(display.value);
        } catch {
          display.value = "Xato";
        }
      }
    </script>
  </body>
</html>
